<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户 CRM 管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { background: #764ba2; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .content {
            display: flex;
            height: calc(100vh - 200px);
        }
        .sidebar {
            width: 300px;
            border-right: 1px solid #eee;
            padding: 20px;
            overflow-y: auto;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .customer-list {
            list-style: none;
        }
        .customer-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .customer-item:hover {
            background: #f0f0f0;
        }
        .customer-item.active {
            background: #e8eaf6;
            border-left-color: #667eea;
        }
        .customer-item-name {
            font-weight: 600;
            font-size: 14px;
        }
        .customer-item-phone {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .customer-detail {
            display: none;
        }
        .customer-detail.active {
            display: block;
        }
        .detail-section {
            margin-bottom: 30px;
        }
        .detail-section h3 {
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
        }
        .form-field {
            flex: 1;
        }
        .form-field label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .form-field input, .form-field textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-field textarea {
            resize: vertical;
            min-height: 80px;
        }
        .conversation-history {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            font-size: 13px;
        }
        .message.user {
            background: #e8eaf6;
            text-align: right;
        }
        .message.bot {
            background: white;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>客户 CRM 管理</h1>
            <button class="btn" onclick="exportCustomers()">导出客户</button>
        </div>
        <div class="content">
            <div class="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索客户..." onkeyup="searchCustomers()">
                </div>
                <ul class="customer-list" id="customerList"></ul>
            </div>
            <div class="main">
                <div id="emptyState" class="empty-state">
                    <p>选择一个客户查看详情</p>
                </div>
                <div id="customerDetail" class="customer-detail">
                    <div class="detail-section">
                        <h3>基本信息</h3>
                        <div class="form-group">
                            <div class="form-field">
                                <label>姓名</label>
                                <input type="text" id="customerName" readonly>
                            </div>
                            <div class="form-field">
                                <label>电话</label>
                                <input type="text" id="customerPhone" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-field">
                                <label>微信</label>
                                <input type="text" id="customerWechat" readonly>
                            </div>
                            <div class="form-field">
                                <label>地区</label>
                                <input type="text" id="customerArea" readonly>
                            </div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <h3>需求信息</h3>
                        <div class="form-group">
                            <div class="form-field">
                                <label>预算</label>
                                <input type="text" id="customerBudget" readonly>
                            </div>
                            <div class="form-field">
                                <label>风格</label>
                                <input type="text" id="customerStyle" readonly>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-field">
                                <label>空间信息</label>
                                <textarea id="customerSpaceInfo" readonly></textarea>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-field">
                                <label>设计需求</label>
                                <textarea id="customerDesignNeeds" readonly></textarea>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-field">
                                <label>时间计划</label>
                                <textarea id="customerTimeline" readonly></textarea>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-field">
                                <label>特殊需求</label>
                                <textarea id="customerSpecialNeeds" readonly></textarea>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-field">
                                <label>综合需求</label>
                                <textarea id="customerRequirements" readonly></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="detail-section">
                        <h3>对话记录</h3>
                        <div class="conversation-history" id="conversationHistory"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCustomers = [];
        let currentCustomer = null;

        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                const data = await response.json();
                allCustomers = data.customers || [];
                renderCustomerList(allCustomers);
            } catch (error) {
                console.error('Failed to load customers:', error);
            }
        }

        function renderCustomerList(customers) {
            const list = document.getElementById('customerList');
            list.innerHTML = '';
            customers.forEach(customer => {
                const li = document.createElement('li');
                li.className = 'customer-item';
                li.innerHTML = `
                    <div class="customer-item-name">${customer.name || '未命名'}</div>
                    <div class="customer-item-phone">${customer.phone || customer.wechat || '无联系方式'}</div>
                `;
                li.onclick = () => selectCustomer(customer);
                list.appendChild(li);
            });
        }

        function selectCustomer(customer) {
            currentCustomer = customer;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('customerDetail').classList.add('active');
            
            document.getElementById('customerName').value = customer.name || '';
            document.getElementById('customerPhone').value = customer.phone || '';
            document.getElementById('customerWechat').value = customer.wechat || '';
            document.getElementById('customerArea').value = customer.area || '';
            document.getElementById('customerBudget').value = customer.budget || '';
            document.getElementById('customerStyle').value = customer.style || '';
            document.getElementById('customerSpaceInfo').value = customer.space_info || '';
            document.getElementById('customerDesignNeeds').value = customer.design_needs || '';
            document.getElementById('customerTimeline').value = customer.timeline || '';
            document.getElementById('customerSpecialNeeds').value = customer.special_needs || '';
            document.getElementById('customerRequirements').value = customer.requirements || '';
            
            renderConversationHistory(customer.history || []);
        }

        function renderConversationHistory(history) {
            const container = document.getElementById('conversationHistory');
            container.innerHTML = '';
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.textContent = msg.content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function searchCustomers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCustomers.filter(c => 
                (c.name && c.name.toLowerCase().includes(query)) ||
                (c.phone && c.phone.includes(query)) ||
                (c.wechat && c.wechat.toLowerCase().includes(query))
            );
            renderCustomerList(filtered);
        }

        function exportCustomers() {
            const csv = [
                ['姓名', '电话', '微信', '地区', '预算', '风格', '需求'].join(','),
                ...allCustomers.map(c => [
                    c.name || '',
                    c.phone || '',
                    c.wechat || '',
                    c.area || '',
                    c.budget || '',
                    c.style || '',
                    c.requirements || ''
                ].join(','))
            ].join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `customers_${new Date().getTime()}.csv`;
            link.click();
        }

        loadCustomers();
        setInterval(loadCustomers, 5000);
    </script>
</body>
</html>
