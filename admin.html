<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .menu {
            list-style: none;
        }
        .menu-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .menu-item.active {
            background: rgba(255,255,255,0.2);
            font-weight: 600;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        /* CRM 样式 */
        .crm-container {
            display: flex;
            gap: 20px;
            height: 100%;
        }
        .crm-sidebar {
            width: 300px;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .customer-list {
            list-style: none;
        }
        .customer-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .customer-item:hover {
            background: #f0f0f0;
        }
        .customer-item.active {
            background: #e8eaf6;
            border-left-color: #667eea;
        }
        .customer-item-name {
            font-weight: 600;
            font-size: 14px;
        }
        .customer-item-phone {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .crm-main {
            flex: 1;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        .detail-section {
            margin-bottom: 30px;
        }
        .detail-section h3 {
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
        }
        .form-field {
            flex: 1;
        }
        .form-field label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .form-field input, .form-field textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-field textarea {
            resize: vertical;
            min-height: 80px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* 工作流样式 */
        .workflow-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .workflow-tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: #666;
            font-weight: 500;
        }
        .workflow-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .workflow-actions {
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        .btn:hover { background: #764ba2; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .workflow-list {
            list-style: none;
        }
        .workflow-item {
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }
        .workflow-item h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .workflow-item p {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.completed { background: #d4edda; color: #155724; }
        .conversation-history {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            font-size: 13px;
        }
        .message.user {
            background: #e8eaf6;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">企业管理系统</div>
            <ul class="menu">
                <li class="menu-item active" onclick="switchMenu('crm')">👥 客户管理</li>
                <li class="menu-item" onclick="switchMenu('workflow')">⚙️ 工作流</li>
                <li class="menu-item" onclick="switchMenu('dashboard')">📊 数据分析</li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <h1 id="pageTitle">客户管理</h1>
                <div id="headerActions"></div>
            </div>
            <div class="content">
                <!-- CRM 页面 -->
                <div id="crm" class="tab-content active">
                    <div class="crm-container">
                        <div class="crm-sidebar">
                            <div class="search-box">
                                <input type="text" id="searchInput" placeholder="搜索客户..." onkeyup="searchCustomers()">
                            </div>
                            <ul class="customer-list" id="customerList"></ul>
                        </div>
                        <div class="crm-main">
                            <div id="emptyState" class="empty-state">
                                <p>选择一个客户查看详情</p>
                            </div>
                            <div id="customerDetail" style="display: none;">
                                <div class="detail-section">
                                    <h3>基本信息</h3>
                                    <div class="form-group">
                                        <div class="form-field">
                                            <label>姓名</label>
                                            <input type="text" id="customerName" readonly>
                                        </div>
                                        <div class="form-field">
                                            <label>电话</label>
                                            <input type="text" id="customerPhone" readonly>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <div class="form-field">
                                            <label>微信</label>
                                            <input type="text" id="customerWechat" readonly>
                                        </div>
                                        <div class="form-field">
                                            <label>地区</label>
                                            <input type="text" id="customerArea" readonly>
                                        </div>
                                    </div>
                                </div>
                                <div class="detail-section">
                                    <h3>需求信息</h3>
                                    <div class="form-group">
                                        <div class="form-field">
                                            <label>预算</label>
                                            <input type="text" id="customerBudget" readonly>
                                        </div>
                                        <div class="form-field">
                                            <label>风格</label>
                                            <input type="text" id="customerStyle" readonly>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <div class="form-field">
                                            <label>空间信息</label>
                                            <textarea id="customerSpaceInfo" readonly></textarea>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <div class="form-field">
                                            <label>设计需求</label>
                                            <textarea id="customerDesignNeeds" readonly></textarea>
                                        </div>
                                    </div>
                                </div>
                                <div class="detail-section">
                                    <h3>对话记录</h3>
                                    <div class="conversation-history" id="conversationHistory"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 工作流页面 -->
                <div id="workflow" class="tab-content">
                    <div class="workflow-tabs">
                        <div class="workflow-tab active" onclick="switchWorkflowTab('quotes')">报价管理</div>
                        <div class="workflow-tab" onclick="switchWorkflowTab('contracts')">合同管理</div>
                        <div class="workflow-tab" onclick="switchWorkflowTab('reminders')">提醒管理</div>
                    </div>
                    <div class="workflow-actions">
                        <button class="btn" id="workflowBtn" onclick="createWorkflowItem()">创建</button>
                        <button class="btn btn-secondary" id="generateBtn" onclick="generateFromCustomer()">从客户生成</button>
                    </div>
                    <ul class="workflow-list" id="workflowList"></ul>
                </div>

                <!-- 数据分析页面 -->
                <div id="dashboard" class="tab-content">
                    <div style="text-align: center; padding: 40px; color: #999;">
                        <p>数据分析功能开发中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCustomers = [];
        let currentCustomer = null;
        let workflows = { quotes: [], contracts: [], reminders: [] };
        let currentWorkflowTab = 'quotes';

        function switchMenu(menu) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(menu).classList.add('active');
            event.target.classList.add('active');
            
            const titles = { crm: '客户管理', workflow: '工作流', dashboard: '数据分析' };
            document.getElementById('pageTitle').textContent = titles[menu];
            
            if (menu === 'crm') loadCustomers();
            if (menu === 'workflow') loadWorkflows();
        }

        function switchWorkflowTab(tab) {
            currentWorkflowTab = tab;
            document.querySelectorAll('.workflow-tab').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            renderWorkflowList();
        }

        async function loadCustomers() {
            try {
                const response = await fetch('/api/customers');
                const data = await response.json();
                allCustomers = data.customers || [];
                renderCustomerList(allCustomers);
            } catch (error) {
                console.error('Failed to load customers:', error);
            }
        }

        function renderCustomerList(customers) {
            const list = document.getElementById('customerList');
            list.innerHTML = '';
            customers.forEach(customer => {
                const li = document.createElement('li');
                li.className = 'customer-item';
                li.innerHTML = `
                    <div class="customer-item-name">${customer.name || '未命名'}</div>
                    <div class="customer-item-phone">${customer.phone || customer.wechat || '无联系方式'}</div>
                `;
                li.onclick = () => selectCustomer(customer);
                list.appendChild(li);
            });
        }

        function selectCustomer(customer) {
            currentCustomer = customer;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('customerDetail').style.display = 'block';
            
            document.getElementById('customerName').value = customer.name || '';
            document.getElementById('customerPhone').value = customer.phone || '';
            document.getElementById('customerWechat').value = customer.wechat || '';
            document.getElementById('customerArea').value = customer.area || '';
            document.getElementById('customerBudget').value = customer.budget || '';
            document.getElementById('customerStyle').value = customer.style || '';
            document.getElementById('customerSpaceInfo').value = customer.space_info || '';
            document.getElementById('customerDesignNeeds').value = customer.design_needs || '';
            
            renderConversationHistory(customer.history || []);
        }

        function renderConversationHistory(history) {
            const container = document.getElementById('conversationHistory');
            container.innerHTML = '';
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.textContent = msg.content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function searchCustomers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCustomers.filter(c => 
                (c.name && c.name.toLowerCase().includes(query)) ||
                (c.phone && c.phone.includes(query)) ||
                (c.wechat && c.wechat.toLowerCase().includes(query))
            );
            renderCustomerList(filtered);
        }

        function loadWorkflows() {
            const saved = localStorage.getItem('workflows');
            if (saved) {
                workflows = JSON.parse(saved);
            }
            renderWorkflowList();
        }

        function renderWorkflowList() {
            const list = document.getElementById('workflowList');
            const items = workflows[currentWorkflowTab] || [];
            list.innerHTML = items.map(item => {
                let actions = '';
                if (currentWorkflowTab === 'quotes') {
                    actions = `<button class="btn btn-secondary" onclick="generateContractFromQuote(${item.id})">生成合同</button>`;
                }
                return `
                    <li class="workflow-item">
                        <h3>${item.name}</h3>
                        <p>${item.description || item.content || ''}</p>
                        <span class="status ${item.status}">${item.status === 'pending' ? '待处理' : '已完成'}</span>
                        <div style="margin-top: 10px;">
                            ${actions}
                            <button class="btn btn-secondary" onclick="updateWorkflowStatus(${item.id})">标记完成</button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function createWorkflowItem() {
            alert('创建功能开发中...');
        }

        async function generateFromCustomer() {
            if (!currentCustomer) {
                alert('请先在客户管理中选择一个客户');
                return;
            }
            
            if (currentWorkflowTab === 'quotes') {
                try {
                    const response = await fetch('/api/generate-quote', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customer_id: currentCustomer.id })
                    });
                    const data = await response.json();
                    if (data.quote) {
                        workflows.quotes.push({
                            id: Date.now(),
                            name: currentCustomer.name,
                            description: data.quote.content,
                            status: 'pending'
                        });
                        localStorage.setItem('workflows', JSON.stringify(workflows));
                        renderWorkflowList();
                        alert('报价已生成！');
                    }
                } catch (error) {
                    alert('生成失败：' + error.message);
                }
            }
        }

        function generateContractFromQuote(quoteId) {
            const quote = workflows.quotes.find(q => q.id === quoteId);
            if (!quote) return;
            
            const contract = {
                id: Date.now(),
                name: quote.name,
                description: `基于报价生成的合同\n\n报价内容：\n${quote.description}`,
                status: 'pending',
                quoteId: quoteId
            };
            
            workflows.contracts.push(contract);
            localStorage.setItem('workflows', JSON.stringify(workflows));
            alert('合同已生成！');
        }

        function updateWorkflowStatus(itemId) {
            const item = workflows[currentWorkflowTab].find(i => i.id === itemId);
            if (item) {
                item.status = item.status === 'pending' ? 'completed' : 'pending';
                localStorage.setItem('workflows', JSON.stringify(workflows));
                renderWorkflowList();
            }
        }

        loadCustomers();
        loadWorkflows();
    </script>
</body>
</html>
